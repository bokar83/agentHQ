# thepopebot sidecar — isolated from main agentsHQ stack
# Deploy:   docker-compose -f docker-compose.thepopebot.yml up -d
# Rollback: docker-compose -f docker-compose.thepopebot.yml down
#
# Traefik routing handled by existing root-traefik-1 (ports 80/443).
# This file does NOT include a Traefik service.
# Set APP_HOSTNAME in thepopebot/.env before deploying.

services:

  event-handler:
    image: stephengpope/thepopebot:event-handler-${THEPOPEBOT_VERSION}
    container_name: thepopebot-event-handler
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - PORT=3001
      - APP_URL=${APP_URL}
      - APP_HOSTNAME=${APP_HOSTNAME}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST}
      - DATABASE_PATH=${DATABASE_PATH}
      - GH_OWNER=${GH_OWNER}
      - GH_REPO=${GH_REPO}
      - GH_TOKEN=${GH_TOKEN}
      - GH_WEBHOOK_SECRET=${GH_WEBHOOK_SECRET}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CODING_AGENT=${CODING_AGENT}
      - CODING_AGENT_CLAUDE_CODE_AUTH=${CODING_AGENT_CLAUDE_CODE_AUTH}
      - ORCHESTRATOR_API_KEY=${ORCHESTRATOR_API_KEY}
      - THEPOPEBOT_VERSION=${THEPOPEBOT_VERSION}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CUSTOM_OPENAI_BASE_URL=${CUSTOM_OPENAI_BASE_URL}
    volumes:
      - /root/agentsHQ/thepopebot:/project
      - /root/agentsHQ/thepopebot/event-handler:/app/event-handler
      - /root/agentsHQ/thepopebot/agent-job:/app/agent-job
      - /root/agentsHQ/thepopebot/skills:/app/skills
      - /root/agentsHQ/thepopebot/.env:/app/.env
      - /root/agentsHQ/thepopebot/data:/app/data
      - /root/agentsHQ/thepopebot/logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.thepopebot.rule=Host(`${APP_HOSTNAME}`)"
      - "traefik.http.routers.thepopebot.tls=true"
      - "traefik.http.routers.thepopebot.entrypoints=web,websecure"
      - "traefik.http.routers.thepopebot.tls.certresolver=mytlschallenge"
      - "traefik.http.services.thepopebot.loadbalancer.server.port=3001"
      - "traefik.docker.network=root_default"
    networks:
      - agentshq_orc-net
      - thepopebot-net
      - root_default

  litellm:
    image: ghcr.io/berriai/litellm@sha256:9e1536c6a9219519f024f221706b20b012ca5176988164798adc5c7fe011e5d5
    container_name: thepopebot-litellm
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    networks:
      - thepopebot-net

  chat-ui:
    image: nginx:alpine
    container_name: thepopebot-chat-ui
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - /root/agentsHQ/thepopebot/chat-ui:/usr/share/nginx/html:ro
      - /root/agentsHQ/thepopebot/chat-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chat-ui.rule=Host(`${APP_HOSTNAME}`) && PathPrefix(`/chat`)"
      - "traefik.http.routers.chat-ui.tls=true"
      - "traefik.http.routers.chat-ui.entrypoints=websecure"
      - "traefik.http.routers.chat-ui.tls.certresolver=mytlschallenge"
      - "traefik.http.services.chat-ui.loadbalancer.server.port=80"
      - "traefik.docker.network=root_default"
    networks:
      - root_default

  runner:
    image: myoung34/github-runner:latest
    container_name: thepopebot-runner
    restart: unless-stopped
    environment:
      - RUNNER_SCOPE=repo
      - REPO_URL=https://github.com/bokar83/agentHQ
      - ACCESS_TOKEN=${GH_TOKEN}
      - RUNNER_NAME=agentshq-vps-runner
      - RUNNER_WORKDIR=/tmp/runner
      - LABELS=self-hosted,vps
    volumes:
      - /root/agentsHQ:/root/agentsHQ
      - /var/run/docker.sock:/var/run/docker.sock
      - runner_work:/tmp/runner
    networks:
      - agentshq_orc-net
      - thepopebot-net
      - root_default

networks:
  agentshq_orc-net:
    external: true
  root_default:
    external: true
  thepopebot-net:
    driver: bridge

volumes:
  runner_work:
