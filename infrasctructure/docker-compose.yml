version: '3.8'
# ============================================================
# agentsHQ STACK v2.0
# Catalyst Works Consulting — Boubacar Barry
#
# Containers managed here:
#   - postgres     (structured memory database)
#   - qdrant       (semantic vector memory)
#   - waha         (WhatsApp bridge)
#   - orchestrator (CrewAI agent brain — FastAPI on port 8000)
#
# NOT managed here (already running via Hostinger):
#   - traefik      (root-traefik-1)
#   - n8n          (root-n8n-1 at https://n8n.srv1040886.hstgr.cloud)
#
# n8n calls the orchestrator via: http://localhost:8000/run
# ============================================================

services:

  # ── DATABASE ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./setup-database.sql:/docker-entrypoint-initdb.d/setup-database.sql
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - orc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── VECTOR MEMORY ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: orc-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    networks:
      - orc-net

  # ── WHATSAPP BRIDGE ───────────────────────────────────────
  # Dashboard: http://72.60.209.109:3000 (localhost only)
  # Points webhook to existing Hostinger n8n
  waha:
    image: devlikeapro/waha:latest
    container_name: orc-waha
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
      - WHATSAPP_HOOK_EVENTS=message
      - WHATSAPP_HOOK_URL=https://n8n.srv1040886.hstgr.cloud/webhook/whatsapp-incoming
      - WAHA_PRINT_QR=true
    volumes:
      - ./waha_sessions:/app/.sessions
    networks:
      - orc-net

  # ── AGENT BRAIN ───────────────────────────────────────────
  # CrewAI orchestrator — receives tasks, assembles crews, returns deliverables
  # Health: curl http://localhost:8000/health
  # Task:   curl -X POST http://localhost:8000/run -H "Content-Type: application/json" -d '{"task":"..."}'
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: orc-crewai
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_BASE=https://openrouter.ai/api/v1
      - POSTGRES_HOST=orc-postgres
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - QDRANT_URL=http://orc-qdrant:6333
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - VPS_IP=${VPS_IP}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USERNAME=${GITHUB_USERNAME}
      - GITHUB_REPO=${GITHUB_REPO}
      - REPORT_EMAIL=${REPORT_EMAIL}
      - APOLLO_API_KEY=${APOLLO_API_KEY}
    volumes:
      - ./agent_outputs:/app/outputs
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - orc-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

networks:
  orc-net:
    driver: bridge
