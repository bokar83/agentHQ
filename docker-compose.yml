# agentsHQ STACK v2.0
# Catalyst Works Consulting — Boubacar Diallo
#
# Containers managed here:
#   - postgres     (structured memory database)
#   - qdrant       (semantic vector memory)
#   - # waha         (WhatsApp bridge)
#   - orchestrator (CrewAI agent brain — FastAPI on port 8000)
#
# NOT managed here (already running via Hostinger):
#   - traefik      (root-traefik-1)
#   - n8n          (root-n8n-1 at https://n8n.srv1040886.hstgr.cloud)
#
# n8n calls the orchestrator via: http://localhost:8000/run
# ============================================================

services:

  # ── DATABASE ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./setup-database.sql:/docker-entrypoint-initdb.d/setup-database.sql
    ports:
      - "5432:5432"
    networks:
      - orc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── VECTOR MEMORY ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: orc-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    networks:
      - orc-net

