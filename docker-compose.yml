# ============================================================
# agentsHQ STACK v2.0
# Catalyst Works Consulting — Boubacar Barry
#
# Containers managed here:
#   - postgres     (structured memory database)
#   - qdrant       (semantic vector memory)
#   - # waha         (WhatsApp bridge)
#   - orchestrator (CrewAI agent brain — FastAPI on port 8000)
#
# NOT managed here (already running via Hostinger):
#   - traefik      (root-traefik-1)
#   - n8n          (root-n8n-1 at https://n8n.srv1040886.hstgr.cloud)
#
# n8n calls the orchestrator via: http://localhost:8000/run
# ============================================================

services:

  # ── DATABASE ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./setup-database.sql:/docker-entrypoint-initdb.d/setup-database.sql
    # Postgres reachable only from localhost. Orchestrator inside the orc-net
    # docker network connects via the service name "orc-postgres", NOT via
    # the host port. This closes a direct brute-force surface on 5432.
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - orc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── VECTOR MEMORY ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: orc-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    networks:
      - orc-net

#  # ── WHATSAPP BRIDGE ───────────────────────────────────────
#  # Dashboard: http://72.60.209.109:3000 (localhost only)
#  # Points webhook to existing Hostinger n8n
#  waha:
#    image: devlikeapro/waha:latest
#    container_name: orc-waha
#    ports:
#      - "3000:3000"
#    environment:
#      - WHATSAPP_API_KEY=agentshq123
#      - WHATSAPP_DEFAULT_ENGINE=NOWEB
#      - WHATSAPP_HOOK_EVENTS=message
#      - WHATSAPP_HOOK_URL=https://n8n.srv1040886.hstgr.cloud/webhook/whatsapp-incoming
#      - WAHA_PRINT_QR=true
#      - WAHA_DASHBOARD_ENABLED=true
#      - WAHA_DASHBOARD_USERNAME=admin
#      - WAHA_DASHBOARD_PASSWORD=admin123
#    volumes:
#      - ./waha_sessions:/app/.sessions
#    networks:
#      - orc-net

  # METACLAW PROXY: DECOMMISSIONED 2026-04-22.
  # Built 2026-03-31 per docs/superpowers/plans/2026-03-31-metaclaw-integration.md
  # but Phase 1 (get_llm_metaclaw factory in agents.py) was never wired up.
  # Code scan on 2026-04-22 found zero Python references to metaclaw; docker
  # logs over 7 days showed only self-healthz hits and zero external API calls.
  # The container was consuming 177 MB RAM for nothing, so the service block is
  # removed here. To resurrect: uncomment below, then do Phase 1 of the
  # integration plan (not the other way around).
  #
  # metaclaw:
  #   build:
  #     context: ./metaclaw
  #     dockerfile: Dockerfile
  #   image: agentshq-metaclaw:latest
  #   container_name: orc-metaclaw
  #   ...see git history for full block...

  # ── AGENT BRAIN ───────────────────────────────────────────
  # CrewAI orchestrator — receives tasks, assembles crews, returns deliverables
  # Health: curl http://localhost:8000/health
  # Task:   curl -X POST http://localhost:8000/run -H "Content-Type: application/json" -d '{"task":"..."}'
  orchestrator:
    build:
      context: ./
      dockerfile: orchestrator/Dockerfile
    container_name: orc-crewai
    restart: unless-stopped
    # Port bound to localhost only -- public traffic goes through Traefik
    # at agentshq.boubacarbarry.com/api/orc. Direct VPS:8000 access is
    # local-only to block the 142/day scanner probes we were seeing.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_BASE=https://openrouter.ai/api/v1
      - POSTGRES_HOST=orc-postgres
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - QDRANT_URL=http://orc-qdrant:6333
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - VPS_IP=${VPS_IP}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USERNAME=${GITHUB_USERNAME}
      - GITHUB_REPO=${GITHUB_REPO}
      - ORCHESTRATOR_TELEGRAM_BOT_TOKEN=${ORCHESTRATOR_TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_TOKEN=${ORCHESTRATOR_TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - REMOAT_TELEGRAM_BOT_TOKEN=${REMOAT_TELEGRAM_BOT_TOKEN}
      - REMOAT_TELEGRAM_CHAT_ID=${REMOAT_TELEGRAM_CHAT_ID}
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID}
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON}
      - GOOGLE_OAUTH_CREDENTIALS_JSON=${GOOGLE_OAUTH_CREDENTIALS_JSON}
      - REPORT_EMAIL=${REPORT_EMAIL}
      # USE_METACLAW: removed 2026-04-22 with metaclaw decommission
      - NOTION_SECRET=${NOTION_SECRET}
      - NOTION_MEDIA_INDEX_DB_ID=${NOTION_MEDIA_INDEX_DB_ID}
      - KIE_AI_API_KEY=${KIE_AI_API_KEY}
      - NOTION_OUTPUTS_DB_ID=${NOTION_OUTPUTS_DB_ID}
      - IDEAS_DB_ID=${IDEAS_DB_ID}
      - FORGE_TASKS_DB=${FORGE_TASKS_DB}
      - FORGE_PIPELINE_DB=${FORGE_PIPELINE_DB}
      - NOTION_FORGE_PIPELINE_DB_ID=${NOTION_FORGE_PIPELINE_DB_ID}
      - FORGE_REVENUE_DB=${FORGE_REVENUE_DB}
      - FORGE_CONTENT_DB=${FORGE_CONTENT_DB}
      - FORGE_PAGE_ID=${FORGE_PAGE_ID}
      - APOLLO_API_KEY=${APOLLO_API_KEY}
      - HUNTER_API_KEY=${HUNTER_API_KEY}
      - PROSPEO_KEY=${PROSPEO_KEY}
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_PORT=${SUPABASE_PORT}
      - SUPABASE_USER=${SUPABASE_USER}
      - SUPABASE_PASSWORD_B64=${SUPABASE_PASSWORD_B64}
      - SUPABASE_DB=${SUPABASE_DB}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_KEY_SECRET=${SUPABASE_KEY_SECRET}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - GOOGLE_OAUTH_CREDENTIALS_JSON_CW=${GOOGLE_OAUTH_CREDENTIALS_JSON_CW}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - HEALTH_REPORT_TOKEN=${HEALTH_REPORT_TOKEN}
      - ORCHESTRATOR_API_KEY=${ORCHESTRATOR_API_KEY}
      - CHAT_UI_PIN=${CHAT_UI_PIN}
      - NOTEBOOKLM_REGISTRY_SHEET_ID=${NOTEBOOKLM_REGISTRY_SHEET_ID}
      - NOTEBOOKLM_QUEUE_SHEET_ID=${NOTEBOOKLM_QUEUE_SHEET_ID}
      - NOTEBOOKLM_REVIEW_QUEUE_FOLDER_ID=${NOTEBOOKLM_REVIEW_QUEUE_FOLDER_ID}
      - NOTEBOOKLM_LIBRARY_ROOT_ID=${NOTEBOOKLM_LIBRARY_ROOT_ID}
    volumes:
      - ./agent_outputs:/app/outputs
      - /root/.notebooklm-mcp-cli:/root/.notebooklm-mcp-cli
      - ./logs:/app/logs
      - ./secrets:/app/secrets:ro
      - ./orchestrator/skills/doc_routing:/app/orchestrator_skills/doc_routing:ro
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      # metaclaw: decommissioned 2026-04-22
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orc-api.rule=Host(`agentshq.boubacarbarry.com`) && PathPrefix(`/api/orc`)"
      - "traefik.http.routers.orc-api.tls=true"
      - "traefik.http.routers.orc-api.entrypoints=websecure"
      - "traefik.http.routers.orc-api.tls.certresolver=mytlschallenge"
      - "traefik.http.services.orc-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=root_default"
      - "traefik.http.middlewares.orc-strip.stripprefix.prefixes=/api/orc"
      - "traefik.http.routers.orc-api.middlewares=orc-strip"
    networks:
      - orc-net
      - root_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

networks:
  orc-net:
    driver: bridge
  root_default:
    external: true

# No named volumes currently in use.
# (metaclaw_config removed 2026-04-22 with metaclaw decommission.)
