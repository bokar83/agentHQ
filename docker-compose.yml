  # ── METACLAW PROXY ────────────────────────────────────────
  # Meta-learning proxy: skill injection, memory, RL (phased)
  # Proxy endpoint: http://orc-metaclaw:30000/v1 (internal only)
  # Kill switch: set USE_METACLAW=false in .env to bypass
  metaclaw:
    image: python:3.11-slim
    container_name: orc-metaclaw
    restart: unless-stopped
    working_dir: /app
    volumes:
      - metaclaw_config:/root/.metaclaw
      - ./metaclaw:/app/metaclaw_seed:ro
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    command: >
      bash -c "
        pip install --quiet aiming-metaclaw openai torch --index-url https://download.pytorch.org/whl/cpu &&
        mkdir -p /root/.metaclaw/skills &&
        cp -n /app/metaclaw_seed/skills/*.md /root/.metaclaw/skills/ 2>/dev/null || true &&
        if [ ! -f /root/.metaclaw/config.yaml ]; then
          cp /app/metaclaw_seed/config_template.yaml /root/.metaclaw/config.yaml &&
          sed -i 's/YOUR_OPENROUTER_API_KEY_HERE/'\"$$OPENROUTER_API_KEY\"'/' /root/.metaclaw/config.yaml;
        fi &&
        metaclaw start --mode skills_only
      "
    networks:
      - orc-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── AGENT BRAIN ───────────────────────────────────────────
  # CrewAI orchestrator — receives tasks, assembles crews, returns deliverables
  # Health: curl http://localhost:8000/health
  # Task:   curl -X POST http://localhost:8000/run -H "Content-Type: application/json" -d '{"task":"..."}'
  orchestrator:
    build:
      context: ./
      dockerfile: orchestrator/Dockerfile
    container_name: orc-crewai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_BASE=https://openrouter.ai/api/v1
      - POSTGRES_HOST=orc-postgres
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - QDRANT_URL=http://orc-qdrant:6333
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - VPS_IP=${VPS_IP}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USERNAME=${GITHUB_USERNAME}
      - GITHUB_REPO=${GITHUB_REPO}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID}
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON}
      - GOOGLE_OAUTH_CREDENTIALS_JSON=${GOOGLE_OAUTH_CREDENTIALS_JSON}
      - REPORT_EMAIL=${REPORT_EMAIL}
#      - APOLLO_API_KEY=${APOLLO_API_KEY} (removed as requested)
    volumes:
      - ./agent_outputs:/app/outputs
      - ./logs:/app/logs
      - ./secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      metaclaw:
        condition: service_started
    networks:
      - orc-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

networks:
  orc-net:
    driver: bridge

volumes:
  metaclaw_config:
