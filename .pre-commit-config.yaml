repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
          - --exclude-files
          - infrasctructure/\.env
          - --exclude-files
          - infrastructure/\.env
        exclude: \.env$

  - repo: local
    hooks:
      - id: no-em-dashes
        name: no em dashes in markdown
        description: Boubacar's hard rule. Rewrite the sentence.
        entry: python scripts/check_no_em_dashes.py
        language: python
        files: \.md$
        exclude: ^zzzArchive/
        types: [file]
