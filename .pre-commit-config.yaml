repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
          - --exclude-files
          - infrasctructure/\.env
          - --exclude-files
          - infrastructure/\.env
        exclude: \.env$

  - repo: local
    hooks:
      - id: no-em-dashes
        name: no em dashes in markdown
        description: Boubacar's hard rule. Rewrite the sentence.
        entry: python scripts/check_no_em_dashes.py
        language: python
        files: \.md$
        exclude: ^zzzArchive/
        types: [file]
      - id: lint-and-index-skills
        name: Lint and Index Skills
        entry: python scripts/lint_and_index_skills.py
        language: python
        pass_filenames: false
        always_run: true
      - id: check-folder-purpose
        name: Folder Governance (every top-level folder needs AGENTS.md or README.md)
        description: Compass M0 governance enforcement. See docs/GOVERNANCE.md.
        entry: python scripts/check_folder_purpose.py
        language: python
        pass_filenames: false
        always_run: true
