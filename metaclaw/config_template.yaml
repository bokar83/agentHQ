# MetaClaw config template — agentsHQ
# Copy to ~/.metaclaw/config.yaml on VPS, fill in actual keys
# DO NOT commit actual keys to this file

# Phase 1: skills only
mode: skills_only

proxy:
  host: 0.0.0.0
  port: 30000
  api_key: metaclaw-internal   # pragma: allowlist secret

upstream:
  base_url: https://openrouter.ai/api/v1
  api_key: YOUR_OPENROUTER_API_KEY_HERE  # pragma: allowlist secret
  model: openrouter/anthropic/claude-sonnet-4-5

skills:
  retrieval_mode: template     # Phase 1: keyword template retrieval (no numpy required)
  top_k: 3                     # inject top 3 relevant skills per call
  max_tokens: 600              # max tokens injected from skills

memory:
  enabled: false               # Phase 2: set to true
  scope_id: agentshq           # shared namespace across all 3 agents

rl:
  enabled: false               # Phase 3: set to true
  # backend: tinker
  # api_key: YOUR_TINKER_KEY
  # base_url: https://api.tinker.ai/v1
  # model: moonshotai/kimi-k2.5
  # prm_model: openrouter/anthropic/claude-haiku-4-5
