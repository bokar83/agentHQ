name: SecureWatch Nightly & PR Scan
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run daily at 08:00 UTC (02:00 AM Denver Time)
    - cron: '0 8 * * *'

jobs:
  security_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Run Git Hygiene Audit
        run: |
          python agents/security_agent/scripts/audit_git.py .
          
      - name: Run Deep Secret Scan
        run: |
          python agents/security_agent/scripts/scan_secrets.py .
