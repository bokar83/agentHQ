<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agentsHQ — Catalyst Works</title>
  <link rel="icon" type="image/jpeg" href="/chat/favicon.jpg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #071A2E;
      --surface: #0d2540;
      --surface2: #112d4a;
      --border: #1a3a58;
      --accent: #00B7C2;
      --accent-hover: #008F99;
      --orange: #FF7A00;
      --orange-hover: #E06900;
      --text: #e8f0f7;
      --text-dim: #7a9bb5;
      --user-bubble: #0f3a52;
      --agent-bubble: #0d2540;
      --danger: #ef4444;
      --success: #22c55e;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── PIN SCREEN ── */
    #pin-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      padding: 24px;
    }

    .cw-wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .cw-brand {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .cw-brand span.cw-dot { color: var(--orange); }

    .cw-product {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .cw-divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--orange));
      border-radius: 2px;
      margin-top: 2px;
    }

    #pin-screen h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
    #pin-screen p { font-size: 14px; color: var(--text-dim); text-align: center; max-width: 280px; line-height: 1.5; }

    #pin-form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }

    #pin-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 16px;
      padding: 14px 16px;
      outline: none;
      text-align: center;
      letter-spacing: 0.1em;
      transition: border-color 0.15s;
    }
    #pin-input:focus { border-color: var(--accent); }
    #pin-input.error { border-color: var(--danger); }

    #pin-submit {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      padding: 14px;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
    }
    #pin-submit:hover {
      background: linear-gradient(135deg, var(--orange), var(--orange-hover));
      transform: translateY(-1px);
    }
    #pin-submit:active { transform: translateY(0); }
    #pin-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #pin-error { color: var(--danger); font-size: 13px; text-align: center; min-height: 18px; }

    .pin-footer {
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-dim);
      opacity: 0.6;
      letter-spacing: 0.04em;
    }

    /* ── CHAT SCREEN ── */
    #chat-screen { display: none; flex-direction: column; height: 100%; max-width: 760px; margin: 0 auto; }

    #chat-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      background: var(--bg); position: sticky; top: 0; z-index: 10;
    }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }

    .header-brand { display: flex; flex-direction: column; gap: 1px; }
    .header-brand .title {
      font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -0.01em;
    }
    .header-brand .title span { color: var(--orange); }
    .header-brand .product-tag {
      font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent); opacity: 0.85;
    }

    #chat-header .subtitle { font-size: 11px; color: var(--text-dim); margin-left: auto; opacity: 0.7; }

    #messages {
      flex: 1; overflow-y: auto; padding: 24px 20px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 82%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.agent { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px; border-radius: 16px;
      font-size: 14px; line-height: 1.55;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; border: 1px solid rgba(0,183,194,0.25); }
    .msg.agent .bubble { background: var(--agent-bubble); border-bottom-left-radius: 4px; border: 1px solid var(--border); }

    .msg-meta { font-size: 11px; color: var(--text-dim); padding: 0 4px; }

    /* typing indicator */
    .typing-dots {
      display: flex; gap: 5px; padding: 14px 18px;
      background: var(--agent-bubble); border: 1px solid var(--border);
      border-radius: 16px; border-bottom-left-radius: 4px; width: fit-content;
    }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); animation: pulse 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    #input-area {
      padding: 12px 16px; border-top: 1px solid var(--border);
      background: var(--bg); display: flex; flex-direction: column; gap: 8px;
    }

    #file-chip {
      display: none; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--accent);
      border-radius: 8px; padding: 5px 10px; font-size: 12px; color: var(--text-dim);
      max-width: 260px; overflow: hidden; align-self: flex-start;
    }
    #file-chip.visible { display: flex; }
    #file-chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #file-chip-remove {
      cursor: pointer; color: var(--text-dim); font-size: 16px;
      flex-shrink: 0; line-height: 1; padding: 0 2px;
    }
    #file-chip-remove:hover { color: var(--danger); }

    #input-row { display: flex; gap: 8px; align-items: flex-end; }

    #attach-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text-dim);
      cursor: pointer;
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      padding: 0;
    }
    #attach-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,183,194,0.08); }
    #attach-btn.has-file { border-color: var(--accent); color: var(--accent); background: rgba(0,183,194,0.12); }
    #attach-btn svg { display: block; }

    #user-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 15px; line-height: 1.6;
      max-height: 200px; min-height: 72px; outline: none; padding: 10px 14px;
      resize: none; transition: border-color 0.15s;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--text-dim); }

    #send-btn {
      background: var(--orange); border: none; border-radius: 10px;
      color: #fff; cursor: pointer; flex-shrink: 0;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, opacity 0.15s, transform 0.1s; padding: 0;
    }
    #send-btn:hover { background: var(--orange-hover); transform: translateY(-1px); }
    #send-btn:active { transform: translateY(0); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #send-btn svg { display: block; }

    #chat-footer {
      padding: 3px 12px;
      text-align: right;
      font-size: 9px;
      color: var(--text-dim);
      opacity: 0.4;
      letter-spacing: 0.03em;
    }
    .chat-model-hint {
      font-size: 9px; color: var(--text-dim); opacity: 0.35;
      text-align: right; padding: 2px 12px 0;
      letter-spacing: 0.02em;
    }
    #chat-footer a { color: var(--accent); text-decoration: none; }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @media (max-width: 480px) { .msg { max-width: 92%; } }
    .chat-action-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .btn-chat-action { background: #1a3a58; color: #e8f0f7; border: 1px solid var(--accent); border-radius: 5px; padding: 5px 14px; font-size: 13px; cursor: pointer; transition: background 0.15s; }
    .btn-chat-action:hover:not(:disabled) { background: var(--accent); color: #071A2E; }
    .btn-chat-action:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="cw-wordmark">
    <div class="cw-brand">Catalyst Works<span class="cw-dot">.</span></div>
    <div class="cw-product">agentsHQ</div>
    <div class="cw-divider"></div>
  </div>
  <h1>Welcome back</h1>
  <p>Enter your PIN to connect to the agentsHQ team</p>
  <form id="pin-form">
    <input id="pin-input" type="password" placeholder="PIN" autocomplete="current-password" autofocus />
    <button id="pin-submit" type="submit">Connect</button>
    <div id="pin-error"></div>
  </form>
  <div class="pin-footer">Powered by agentsHQ &middot; Catalyst Works Consulting</div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <div id="chat-header">
    <div class="status-dot"></div>
    <div class="header-brand">
      <div class="title">Catalyst Works<span>.</span></div>
      <div class="product-tag">agentsHQ</div>
    </div>
    <div class="subtitle" id="session-label"></div>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="file-input" type="file" style="display:none" />
    <div id="file-chip">
      <span id="file-chip-name"></span>
      <span id="file-chip-remove" title="Remove">&#215;</span>
    </div>
    <div id="input-row">
      <button id="attach-btn" title="Attach file">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea id="user-input" placeholder="Ask the team anything…" rows="3"></textarea>
      <button id="send-btn" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="chat-footer">
    Powered by <strong>agentsHQ</strong> &middot; Built on <a href="https://thepopebot.com" target="_blank" rel="noopener">thepopebot</a> &middot; Catalyst Works Consulting
  </div>
</div>

<script>
  const ORC_BASE = '/api/orc';
  const SESSION_KEY = 'browser:7792432594';
  const TOKEN_TTL_MS = 8 * 60 * 60 * 1000;

  let _token = null;
  let _pendingFileId = null;
  let _pendingFileName = null;

  // ── Bootstrap ──────────────────────────────────────────────
  (function init() {
    const stored = sessionStorage.getItem('chat_token');
    const storedTs = sessionStorage.getItem('chat_token_ts');
    if (stored && storedTs && (Date.now() - parseInt(storedTs, 10)) < TOKEN_TTL_MS) {
      _token = stored;
      showChat();
    }

    document.getElementById('pin-form').addEventListener('submit', submitPin);

    const ta = document.getElementById('user-input');
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
    });
    // Desktop: Enter sends. Mobile (touch device): Enter inserts newline, send button only.
    const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
    if (!isTouchDevice) {
      ta.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
    }

    document.getElementById('send-btn').addEventListener('click', sendMessage);

    // File attachment
    const attachBtn = document.getElementById('attach-btn');
    const fileInput = document.getElementById('file-input');
    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', onFileSelected);
    document.getElementById('file-chip-remove').addEventListener('click', clearFile);
  })();

  // ── File handling ──────────────────────────────────────────
  async function onFileSelected() {
    const fileInput = document.getElementById('file-input');
    const file = fileInput.files[0];
    if (!file) return;

    const attachBtn = document.getElementById('attach-btn');
    attachBtn.style.opacity = '0.5';
    attachBtn.disabled = true;

    try {
      const fd = new FormData();
      fd.append('file', file);
      const res = await fetch(ORC_BASE + '/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + _token },
        body: fd,
      });
      if (res.status === 401) { clearFile(); throw new Error('TOKEN_EXPIRED'); }
      if (!res.ok) {
        const d = await res.json().catch(() => ({}));
        throw new Error(d.detail || 'Upload failed.');
      }
      const data = await res.json();
      _pendingFileId = data.file_id;
      _pendingFileName = data.filename;

      document.getElementById('file-chip-name').textContent = data.filename;
      document.getElementById('file-chip').classList.add('visible');
      attachBtn.classList.add('has-file');
    } catch (ex) {
      appendMessage('agent', 'File upload failed: ' + ex.message);
      clearFile();
    } finally {
      attachBtn.disabled = false;
      attachBtn.style.opacity = '';
    }
  }

  function clearFile() {
    _pendingFileId = null;
    _pendingFileName = null;
    document.getElementById('file-input').value = '';
    document.getElementById('file-chip').classList.remove('visible');
    const attachBtn = document.getElementById('attach-btn');
    attachBtn.classList.remove('has-file');
  }

  // ── PIN flow ───────────────────────────────────────────────
  async function submitPin(e) {
    e.preventDefault();
    const pin = document.getElementById('pin-input').value.trim();
    const btn = document.getElementById('pin-submit');
    const errEl = document.getElementById('pin-error');
    const inp = document.getElementById('pin-input');

    if (!pin) return;
    btn.disabled = true;
    btn.textContent = 'Connecting\u2026';
    errEl.textContent = '';
    inp.classList.remove('error');

    try {
      const res = await fetch(ORC_BASE + '/chat-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin }),
      });
      const data = await res.json();
      if (!res.ok) {
        inp.classList.add('error');
        errEl.textContent = data.detail || 'Connection failed.';
        return;
      }
      _token = data.token;
      sessionStorage.setItem('chat_token', _token);
      sessionStorage.setItem('chat_token_ts', String(Date.now()));
      showChat();
    } catch (_) {
      errEl.textContent = 'Network error. Is the VPS reachable?';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Connect';
    }
  }

  function showChat() {
    document.getElementById('pin-screen').style.display = 'none';
    const cs = document.getElementById('chat-screen');
    cs.style.display = 'flex';
    document.getElementById('session-label').textContent = 'session: ' + SESSION_KEY;
    document.getElementById('user-input').focus();
    loadHistory();
  }

  async function loadHistory() {
    const msgs = document.getElementById('messages');
    try {
      const res = await fetch(ORC_BASE + '/history/' + encodeURIComponent(SESSION_KEY), {
        headers: { 'Authorization': 'Bearer ' + _token },
      });
      if (!res.ok) throw new Error('history fetch failed');
      const data = await res.json();
      const history = data.history || [];
      if (history.length === 0) {
        appendMessage('agent', "Hey \u2014 I\u2019m connected to the agentsHQ team on the VPS. What do you need?");
        return;
      }
      // Show divider then last 10 turns
      const divider = document.createElement('div');
      divider.style.cssText = 'text-align:center;font-size:11px;color:var(--text-dim);padding:8px 0;';
      divider.textContent = '\u2014 recent history \u2014';
      msgs.appendChild(divider);
      const recent = history.slice(-10);
      for (const turn of recent) {
        const role = turn.role === 'user' ? 'user' : 'agent';
        appendMessage(role, turn.content, turn.timestamp);
      }
      msgs.scrollTop = msgs.scrollHeight;
    } catch (_) {
      // History load failed — just show greeting
      appendMessage('agent', "Hey \u2014 I\u2019m connected to the agentsHQ team on the VPS. What do you need?");
    }
  }

  // ── Messaging ──────────────────────────────────────────────
  async function sendMessage() {
    const ta = document.getElementById('user-input');
    const text = ta.value.trim();
    if (!text && !_pendingFileId) return;

    const displayText = _pendingFileName
      ? '\uD83D\uDCCE ' + _pendingFileName + (text ? '\n' + text : '')
      : text;

    ta.value = '';
    ta.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;

    const fileId = _pendingFileId;
    clearFile();

    appendMessage('user', displayText);
    const typing = appendTyping();

    try {
      const r = await postTask(text || 'Please review and summarize the attached file.', fileId);
      typing.remove();
      appendMessage('agent', r.reply || '(no response)', null, r.actions || []);
      // If the crew returned a job_id, poll for the crew result and append it
      if (r.job_id) {
        appendMessage('agent', 'Running\u2026 I will update you when done.');
        pollJob(r.job_id);
      }
    } catch (ex) {
      typing.remove();
      if (ex.message === 'TOKEN_EXPIRED') {
        sessionStorage.removeItem('chat_token');
        sessionStorage.removeItem('chat_token_ts');
        appendMessage('agent', 'Session expired. Refreshing\u2026');
        setTimeout(() => location.reload(), 1500);
      } else {
        appendMessage('agent', 'Error: ' + ex.message);
      }
    } finally {
      document.getElementById('send-btn').disabled = false;
      document.getElementById('user-input').focus();
    }
  }

  // Send through /atlas/chat -- same handler as the Atlas panel
  async function postTask(text, fileId) {
    var userMsg = { role: 'user', content: text };
    if (fileId) userMsg.content = '[Attached file: ' + fileId + ']\n' + text;
    const res = await fetch(ORC_BASE + '/atlas/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + _token,
      },
      body: JSON.stringify({ messages: [userMsg], session_key: SESSION_KEY }),
    });
    if (res.status === 401) throw new Error('TOKEN_EXPIRED');
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || 'HTTP ' + res.status);
    }
    return res.json();
  }

  function pollJob(jobId) {
    var timer = setInterval(function() {
      fetch(ORC_BASE + '/atlas/job/' + jobId, {
        headers: { 'Authorization': 'Bearer ' + _token },
      }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.status === 'completed' || d.status === 'failed') {
          clearInterval(timer);
          var msg = d.status === 'completed' ? (d.result || 'Done.') : ('Failed: ' + (d.error || 'unknown'));
          appendMessage('agent', msg);
        }
      }).catch(function() {});
    }, 3000);
  }

  // Markdown renderer identical to atlas-chat.js -- safe DOM only, no innerHTML
  function _mdFragment(text) {
    var frag = document.createDocumentFragment();
    if (!text) return frag;
    var parts = text.split(/(```[\s\S]*?```)/g);
    parts.forEach(function(part) {
      if (part.startsWith('```')) {
        var inner = part.replace(/^```[^\n]*\n?/, '').replace(/```$/, '');
        var pre = document.createElement('pre');
        var code = document.createElement('code');
        code.textContent = inner;
        pre.appendChild(code);
        frag.appendChild(pre);
        return;
      }
      part.split(/\n\n+/).forEach(function(block) {
        block = block.trim();
        if (!block) return;
        var lines = block.split('\n');
        var hasDash = lines.some(function(l){return l.startsWith('- ');});
        if (hasDash && lines.every(function(l){return !l.trim()||l.startsWith('- ');})) {
          var ul = document.createElement('ul');
          lines.forEach(function(l){if(l.trim()){var li=document.createElement('li');li.textContent=l.slice(2);ul.appendChild(li);}});
          frag.appendChild(ul); return;
        }
        var numRe = /^\d+\. /;
        if (lines.some(function(l){return numRe.test(l);}) && lines.every(function(l){return !l.trim()||numRe.test(l);})) {
          var ol = document.createElement('ol');
          lines.forEach(function(l){if(l.trim()){var li=document.createElement('li');li.textContent=l.replace(numRe,'');ol.appendChild(li);}});
          frag.appendChild(ol); return;
        }
        var hm = block.match(/^(#{1,3}) (.+)/);
        if (hm) {
          var h = document.createElement('h'+Math.min(hm[1].length,3));
          h.textContent = hm[2]; frag.appendChild(h); return;
        }
        var p = document.createElement('p');
        var re = /(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/g, last=0, m;
        while ((m=re.exec(block))!==null) {
          if(m.index>last) p.appendChild(document.createTextNode(block.slice(last,m.index)));
          var t=m[0],n;
          if(t.startsWith('**')){n=document.createElement('strong');n.textContent=t.slice(2,-2);}
          else if(t.startsWith('*')){n=document.createElement('em');n.textContent=t.slice(1,-1);}
          else{n=document.createElement('code');n.textContent=t.slice(1,-1);}
          p.appendChild(n); last=m.index+t.length;
        }
        if(last<block.length) p.appendChild(document.createTextNode(block.slice(last)));
        frag.appendChild(p);
      });
    });
    return frag;
  }

  // ── DOM helpers ────────────────────────────────────────────
  function appendMessage(role, text, isoTimestamp, actions) {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'user') { bubble.textContent = text; }
    else { bubble.appendChild(_mdFragment(text)); }

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const ts = isoTimestamp ? new Date(isoTimestamp) : new Date();
    meta.textContent = ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    wrap.appendChild(bubble);
    if (actions && actions.length) {
      const row = document.createElement('div');
      row.className = 'chat-action-row';
      actions.forEach(function(a) {
        const btn = document.createElement('button');
        btn.className = 'btn-chat-action';
        btn.textContent = a.label || '';
        btn.addEventListener('click', async function() {
          btn.disabled = true;
          const cb = a.callback_data || '';
          try {
            if (cb.indexOf('confirm:') === 0) {
              const token = cb.slice('confirm:'.length);
              const cr = await fetch(ORC_BASE + '/atlas/confirm/' + token, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _token }, body: '{}' });
              const d = await cr.json();
              row.remove();
              if (d.job_id) { appendMessage('agent', 'Running… I will update you when done.'); pollJob(d.job_id); }
              else { appendMessage('agent', d.message || 'Done.'); }
            } else if (cb.indexOf('cancel:') === 0) {
              const token = cb.slice('cancel:'.length);
              fetch(ORC_BASE + '/atlas/confirm/' + token + '/cancel', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _token }, body: '{}' }).catch(() => {});
              row.remove();
              appendMessage('agent', 'Cancelled.');
            }
          } catch(e) { btn.disabled = false; appendMessage('agent', 'Error: ' + e.message); }
        });
        row.appendChild(btn);
      });
      wrap.appendChild(row);
    }
    wrap.appendChild(meta);
    msgs.appendChild(wrap);
    requestAnimationFrame(function() { msgs.scrollTop = msgs.scrollHeight; });
    return wrap;
  }

  function appendTyping() {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg agent';

    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    for (let i = 0; i < 3; i++) {
      const s = document.createElement('span');
      dots.appendChild(s);
    }

    wrap.appendChild(dots);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return wrap;
  }

</script>
