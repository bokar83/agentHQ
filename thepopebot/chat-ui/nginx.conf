server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location /chat/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    location = /chat {
        try_files /index.html =404;
    }

    location = /atlas/cost {
        root /usr/share/nginx/html;
        try_files /cost.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location = /atlas/roadmap {
        root /usr/share/nginx/html;
        try_files /roadmap.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location = /atlas/lighthouse {
        root /usr/share/nginx/html;
        try_files /atlas-lighthouse.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location /atlas/ {
        alias /usr/share/nginx/html/;
        try_files $uri /atlas.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location = /atlas {
        try_files /atlas.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location / {
        try_files $uri /index.html;
    }
}
