server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location /chat/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    location = /chat {
        try_files /index.html =404;
    }

    location /atlas/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /atlas.html;
    }

    location = /atlas {
        try_files /atlas.html =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
