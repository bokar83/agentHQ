<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 800px; height: 800px; background: #F7EDD8; overflow: hidden; }
  svg { width: 800px; height: 800px; display: block; }
</style>
</head>
<body>
<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Single compound-interest growth curve: starts bottom-left, sweeps up to top-right -->
  <!-- Exponential curve: low flat start, steep finish -->
  <path
    d="M 160 620 C 260 610, 420 540, 640 160"
    fill="none"
    stroke="#166B50"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
</body>
</html>
