<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 2560px; height: 1440px; overflow: hidden; }

  .banner {
    width: 2560px;
    height: 1440px;
    position: relative;
    overflow: hidden;
  }

  .bg {
    position: absolute;
    inset: 0;
    background: url('bg-firstgen.png') center center / cover no-repeat;
  }

  /* Light overlay — cream fabric shows through, just brightened slightly */
  .overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right,
        rgba(253, 250, 244, 0.82) 0%,
        rgba(253, 250, 244, 0.65) 40%,
        rgba(253, 250, 244, 0.20) 70%,
        rgba(253, 250, 244, 0.05) 100%
      ),
      linear-gradient(to bottom,
        rgba(253, 250, 244, 0.4) 0%,
        transparent 30%,
        transparent 70%,
        rgba(247, 237, 216, 0.6) 100%
      );
  }

  /* Violet left bar */
  .bar-left {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 16px;
    background: #6B3FA0;
  }

  /* Gold bottom bar */
  .bar-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 8px;
    background: #D4922A;
  }

  /* Grove green top rule — thin */
  .bar-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #166B50;
    opacity: 0.5;
  }

  /* Giant ghost number — anchored right, gives depth */
  .ghost-number {
    position: absolute;
    right: 100px;
    top: 50%;
    transform: translateY(-52%);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 600px;
    color: #166B50;
    opacity: 0.07;
    line-height: 1;
    letter-spacing: -0.04em;
    user-select: none;
  }

  /* Content */
  .content {
    position: absolute;
    left: 520px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    max-width: 900px;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.22em;
    color: #6B3FA0;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .channel-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 138px;
    line-height: 0.92;
    letter-spacing: -0.025em;
    margin-bottom: 50px;
  }

  .first-gen { color: #166B50; display: block; }
  .money { color: #D4922A; display: block; }

  .divider {
    width: 80px;
    height: 4px;
    background: #D4922A;
    margin-bottom: 34px;
  }

  .tagline {
    font-family: 'Inter', sans-serif;
    font-size: 36px;
    font-weight: 400;
    color: #1A1F2E;
    opacity: 0.7;
    margin-bottom: 20px;
    letter-spacing: 0.01em;
  }

  .sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 26px;
    color: #8A9099;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="bar-top"></div>
  <div class="bar-left"></div>

  <!-- Ghost number right side -->
  <div class="ghost-number">+22%</div>

  <div class="content">
    <p class="eyebrow">Financial Education for First-Gens</p>
    <h1 class="channel-name">
      <span class="first-gen">First Generation</span>
      <span class="money">Money</span>
    </h1>
    <div class="divider"></div>
    <p class="tagline">The money talk your family never had.</p>
    <p class="sub">Education &nbsp;·&nbsp; Not advice &nbsp;·&nbsp; Pass it on</p>
  </div>

  <div class="bar-bottom"></div>
</div>
</body>
</html>
