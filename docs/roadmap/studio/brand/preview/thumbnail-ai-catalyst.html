<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; }

  .thumb {
    width: 1280px;
    height: 720px;
    position: relative;
    overflow: hidden;
    background: #120B3D;
  }

  .bg {
    position: absolute;
    inset: 0;
    background: url('bg-catalyst.png') center center / cover no-repeat;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right,
        rgba(9, 5, 30, 0.97) 0%,
        rgba(9, 5, 30, 0.80) 50%,
        rgba(9, 5, 30, 0.25) 100%
      ),
      linear-gradient(to top,
        rgba(9, 5, 30, 0.9) 0%,
        transparent 50%
      );
  }

  /* Orange top bar */
  .bar-top { position: absolute; top: 0; left: 0; right: 0; height: 7px; background: #F26419; }

  /* BIG stat — visual anchor, left side */
  .big-stat {
    position: absolute;
    left: 48px;
    top: 48px;
  }

  .stat-number {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 180px;
    color: #F26419;
    line-height: 1;
    letter-spacing: -0.04em;
  }

  .stat-label {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 24px;
    color: #8B7FD4;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Question — bottom */
  .content {
    position: absolute;
    bottom: 44px;
    left: 48px;
    right: 48px;
  }

  .question {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    font-size: 72px;
    line-height: 1;
    color: #F8F6FF;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }

  .channel-tag {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 24px;
    color: #8B7FD4;
    opacity: 0.7;
    letter-spacing: 0.06em;
  }

  /* Green bottom rule */
  .bar-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: #1DB954; opacity: 0.7; }
</style>
</head>
<body>
<div class="thumb">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="bar-top"></div>

  <div class="big-stat">
    <div class="stat-number">44%</div>
    <p class="stat-label">of your skills · WEF 2023</p>
  </div>

  <div class="content">
    <h1 class="question">Is your job<br>on the list?</h1>
    <p class="channel-tag">AI Catalyst · Boubacar Barry</p>
  </div>

  <div class="bar-bottom"></div>
</div>
</body>
</html>
